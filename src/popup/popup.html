<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=320" />
  <title>AniList Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1622;
      color: #c5cae9;
      font-size: 14px;
    }

    /* ── Header ── */
    .header {
      background: #151f2e;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1f2d40;
    }

    .header h1 {
      font-size: 15px;
      color: #3db4f2;
      font-weight: 600;
    }

    .header .status {
      font-size: 11px;
      color: #6b7c93;
    }

    .header .status.connected {
      color: #2ecc71;
    }

    /* ── Content sections ── */
    .section {
      padding: 14px 16px;
    }

    /* ── Login view ── */
    #login-view {
      text-align: center;
      padding: 32px 16px;
    }

    #login-view p {
      margin-bottom: 16px;
      color: #8896a8;
      font-size: 13px;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn-primary {
      background: #3db4f2;
      color: #0b1622;
    }

    .btn-success {
      background: #2ecc71;
      color: #0b1622;
    }

    .btn-ghost {
      background: transparent;
      color: #6b7c93;
      border: 1px solid #1f2d40;
    }

    /* ── Detection card ── */
    .detection-card {
      background: #151f2e;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .detection-card .manga-title {
      font-weight: 600;
      color: #e0e6ed;
      margin-bottom: 4px;
    }

    .detection-card .manga-chapter {
      color: #3db4f2;
      font-size: 13px;
    }

    .detection-card .manga-source {
      color: #6b7c93;
      font-size: 11px;
      margin-top: 4px;
    }

    /* ── Search results list ── */
    .results-list {
      list-style: none;
    }

    .results-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .results-list li:hover {
      background: #1a2738;
    }

    .results-list li img {
      width: 36px;
      height: 52px;
      object-fit: cover;
      border-radius: 4px;
    }

    .results-list li .info {
      flex: 1;
      min-width: 0;
    }

    .results-list li .info .title {
      font-size: 13px;
      color: #e0e6ed;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .results-list li .info .subtitle {
      font-size: 11px;
      color: #6b7c93;
    }

    /* ── Settings ── */
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .setting-row label {
      font-size: 13px;
    }

    /* ── No detection ── */
    .empty {
      text-align: center;
      padding: 24px 16px;
      color: #6b7c93;
      font-size: 13px;
    }

    .footer {
      padding: 8px 16px;
      text-align: center;
      border-top: 1px solid #1f2d40;
      font-size: 11px;
      color: #4a5568;
    }

    .footer a {
      color: #3db4f2;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <!-- Login view (shown when not authenticated) -->
  <div id="login-view" style="display: none;">
    <h2 style="color: #3db4f2; margin-bottom: 8px;">AniList Tracker</h2>
    <p>Connect your AniList account to start tracking your reading progress.</p>
    <button class="btn btn-primary" id="btn-login">Connect to AniList</button>
  </div>

  <!-- Main view (shown when authenticated) -->
  <div id="main-view" style="display: none;">
    <div class="header">
      <h1>AniList Tracker</h1>
      <span class="status connected" id="username">—</span>
    </div>

    <!-- Detection info -->
    <div class="section" id="detection-section" style="display: none;">
      <div class="detection-card">
        <div class="manga-title" id="detected-title">—</div>
        <div class="manga-chapter" id="detected-chapter">—</div>
        <div class="manga-source" id="detected-source">—</div>
      </div>

      <!-- AniList search results (pick the right one) -->
      <div id="results-section" style="display: none;">
        <p style="font-size: 12px; color: #8896a8; margin-bottom: 8px;">
          Select the correct manga on AniList:
        </p>
        <ul class="results-list" id="results-list"></ul>
      </div>

      <!-- Confirm update -->
      <div id="confirm-section" style="display: none;">
        <button class="btn btn-success" id="btn-update" style="width: 100%;">
          Update Progress
        </button>
      </div>
    </div>

    <!-- No detection -->
    <div class="empty" id="empty-section">
      Navigate to a manga chapter page to detect and sync your progress.
    </div>

    <div class="footer">
      <a href="https://anilist.co/settings/apps" target="_blank">Manage AniList Apps</a>
    </div>
  </div>

  <script src="popup.ts" type="module"></script>
</body>
</html>
