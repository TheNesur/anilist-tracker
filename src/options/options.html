<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>AniList Tracker — Paramètres</title>
  <style>
    :root[data-theme="dark"] {
      --bg-primary: #0b1622;
      --bg-secondary: #151f2e;
      --bg-tertiary: #1a2738;
      --border: #1f2d40;
      --text-primary: #e0e6ed;
      --text-secondary: #c5cae9;
      --text-muted: #6b7c93;
      --accent: #3db4f2;
      --success: #2ecc71;
      --error: #e74c3c;
      --danger-bg: #2d1a1a;
      --danger-border: #5c2020;
    }

    :root[data-theme="light"] {
      --bg-primary: #f0f4f8;
      --bg-secondary: #ffffff;
      --bg-tertiary: #e8edf2;
      --border: #d0d9e4;
      --text-primary: #1a2738;
      --text-secondary: #2d3f55;
      --text-muted: #6b7c93;
      --accent: #1a8ac4;
      --success: #27ae60;
      --error: #c0392b;
      --danger-bg: #fdf0f0;
      --danger-border: #f5c6c6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-size: 14px;
      min-height: 100vh;
    }

    .page {
      max-width: 520px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .page-header h1 {
      font-size: 20px;
      color: var(--accent);
      font-weight: 600;
    }

    .page-header .subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding: 12px 16px 8px;
      border-bottom: 1px solid var(--border);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .row:last-child { border-bottom: none; }
    .row-label { font-size: 14px; color: var(--text-primary); }
    .row-hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle input:checked + .toggle-track { background: var(--accent); }

    .toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
      pointer-events: none;
    }

    .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

    .theme-options {
      display: flex;
      gap: 10px;
      padding: 14px 16px;
    }

    .theme-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 2px solid var(--border);
      cursor: pointer;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      transition: border-color 0.2s;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }

    .theme-btn.active { border-color: var(--accent); color: var(--accent); }

    .theme-btn .theme-preview {
      width: 100%;
      height: 32px;
      border-radius: 4px;
      margin-bottom: 6px;
    }

    .theme-btn.dark-btn .theme-preview { background: #0b1622; border: 1px solid #1f2d40; }
    .theme-btn.light-btn .theme-preview { background: #f0f4f8; border: 1px solid #d0d9e4; }

    .account-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
    }

    .account-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .account-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .account-id { font-size: 11px; color: var(--text-muted); }

    .section.danger {
      border-color: var(--danger-border);
      background: var(--danger-bg);
    }

    .btn-danger {
      background: var(--error);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .btn-danger:hover { opacity: 0.85; }

    .link-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--text-secondary);
      transition: background 0.15s;
    }

    .link-row:last-child { border-bottom: none; }
    .link-row:hover { background: var(--bg-tertiary); }
    .link-icon { font-size: 16px; width: 20px; text-align: center; }
    .link-text { font-size: 13px; }
    .link-arrow { margin-left: auto; color: var(--text-muted); font-size: 12px; }

    .version {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <div>
        <h1>AniList Tracker</h1>
        <div class="subtitle" id="page-title"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title" id="section-account"></div>
      <div class="account-info">
        <div class="account-avatar">👤</div>
        <div>
          <div class="account-name" id="account-name">…</div>
          <div class="account-id" id="account-id"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title" id="section-appearance"></div>
      <div class="theme-options">
        <button class="theme-btn dark-btn" id="theme-dark">
          <div class="theme-preview"></div>
          <span id="theme-dark-label"></span>
        </button>
        <button class="theme-btn light-btn" id="theme-light">
          <div class="theme-preview"></div>
          <span id="theme-light-label"></span>
        </button>
      </div>
    </div>

    <div class="section">
      <div class="section-title" id="section-behavior"></div>
      <div class="row">
        <div>
          <div class="row-label" id="label-autoupdate"></div>
          <div class="row-hint" id="hint-autoupdate"></div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggle-autoupdate" />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>

    <div class="section">
      <div class="section-title" id="section-info"></div>
      <a class="link-row" href="https://github.com/TheNesur/anilist-tracker" target="_blank">
        <span class="link-icon"></span>
        <span class="link-text" id="link-source"></span>
        <span class="link-arrow">↗</span>
      </a>
      <a class="link-row" href="https://github.com/TheNesur/anilist-tracker/issues" target="_blank">
        <span class="link-icon"></span>
        <span class="link-text" id="link-bug"></span>
        <span class="link-arrow">↗</span>
      </a>
      <a class="link-row" href="https://github.com/TheNesur/anilist-tracker/blob/main/PRIVACY.md" target="_blank">
        <span class="link-icon"></span>
        <span class="link-text" id="link-privacy"></span>
        <span class="link-arrow">↗</span>
      </a>
      <a class="link-row" href="https://anilist.co" target="_blank">
        <span class="link-icon"></span>
        <span class="link-text" id="link-anilist"></span>
        <span class="link-arrow">↗</span>
      </a>
    </div>

    <div class="section danger">
      <div class="section-title" id="section-danger"></div>
      <div class="row">
        <div>
          <div class="row-label" id="label-logout"></div>
          <div class="row-hint" id="hint-logout"></div>
        </div>
        <button class="btn-danger" id="btn-logout"></button>
      </div>
    </div>

    <div class="version" id="version"></div>
  </div>

  <script src="options.ts" type="module"></script>
</body>
</html>
